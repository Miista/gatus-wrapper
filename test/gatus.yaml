alerting:
  ntfy:
    topic: alerts
    url: "https://notify.palmund.net"
    token: "$NTFY_TOKEN"
    default-alert:
      failure-threshold: 1
      success-threshold: 1
      send-on-resolved: true

endpoints:
  - name: manual-example
    url: https://example.com
    interval: 5m
    conditions:
      - "[STATUS] == 200"
